<div class="getting-started">
  <h4>Set Sail</h4>

  <div class="step">
    <span class="step-num">1</span>
    <div class="step-content">
      <p>Install typed-claude-hooks in your project:</p>
      <div class="command-line">
        <code>npm install typed-claude-hooks</code>
        <button (click)="copy('npm install typed-claude-hooks', 'install')">
          {{ copiedField() === 'install' ? '✓' : '⧉' }}
        </button>
      </div>
    </div>
  </div>

  <div class="step">
    <span class="step-num">2</span>
    <div class="step-content">
      <p>Save your hooks config:</p>
      <div class="actions">
        <button class="action-btn" (click)="copyCode()">
          {{ copiedField() === 'code' ? '✓ Copied!' : '⧉ Copy hooks.config.ts' }}
        </button>
        <button class="action-btn" (click)="downloadCode()">↓ Download hooks.config.ts</button>
      </div>
    </div>
  </div>

  <div class="step">
    <span class="step-num">3</span>
    <div class="step-content">
      <p>Build your hooks:</p>
      <div class="command-line">
        <code>npx typed-claude-hooks build</code>
        <button (click)="copy('npx typed-claude-hooks build', 'build')">
          {{ copiedField() === 'build' ? '✓' : '⧉' }}
        </button>
      </div>
    </div>
  </div>

  <p class="note">
    This compiles your TypeScript hooks to CJS and merges them into
    <code>.claude/settings.json</code>.
  </p>
</div>
